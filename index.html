<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formularz Logowania</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./data/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./data/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./data/favicon/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&family=Bitcount+Grid+Double:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="text-font-basic tlo-ciemne">
    <nav>
      <h1 id="logo" class="bitcount-grid-double-logo">BAZA</h1>
      <i id="themeToggle" class="fa-solid fa-moon moon"></i>
    </nav>

    <main class="prostokat prostokat-login pressed">
      <div id="loginForm">
        <form action="#" method="POST">
          <div>
            <label class="label-login" for="login">e-mail</label>
            <input class="green" type="text" id="login" name="login" />
          </div>

          <div>
            <label class="label-password" for="haslo">Hasło</label>
            <input class="green" type="password" id="haslo" name="haslo" />
          </div>

          <div class="submit-container">
            <button class="btn-login text-font-basic" type="submit">Login</button>
          </div>
        </form>

        <div class="flex-register">
          <a href="./register.html"><button class="btn-register text-font-basic" type="button">Register</button></a>
        </div>
      </div>
      <h1 id="komunikat"></h1>
    </main>
  </body>
  <script src="https://kit.fontawesome.com/bedd49e2c8.js" crossorigin="anonymous"></script>
  <script src="./js/login.js"></script>
  <script src="./js/animationsLogin.js"></script>

  <script src="./js/darkMode.js"></script>
</html>
